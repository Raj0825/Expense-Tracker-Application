<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpendSmart — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#05050f;--card:#0d0d20;--border:#1e1e3a;--accent:#7c5cfc;
  --accent2:#22d3a5;--text:#f0f0ff;--muted:#6b6b8a;--danger:#f43f5e;
  --input:#12122a;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18;animation:float 8s ease-in-out infinite}
.orb1{width:500px;height:500px;background:var(--accent);top:-100px;left:-100px;animation-delay:0s}
.orb2{width:400px;height:400px;background:var(--accent2);bottom:-100px;right:-100px;animation-delay:3s}
.orb3{width:300px;height:300px;background:#f43f5e;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:5s}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.05)}}
.container{position:relative;z-index:1;width:100%;max-width:440px;padding:20px}
.logo{text-align:center;margin-bottom:36px}
.logo-mark{width:52px;height:52px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:14px;box-shadow:0 0 40px rgba(124,92,252,.4)}
.logo h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-1px}
.logo h1 span{color:var(--accent)}
.logo p{color:var(--muted);font-size:13px;margin-top:4px}
.card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:36px;backdrop-filter:blur(20px)}
.tabs{display:flex;gap:4px;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:28px}
.tab{flex:1;padding:10px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;border-radius:8px;cursor:pointer;transition:.2s}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 4px 20px rgba(124,92,252,.4)}
.form{display:none}
.form.active{display:block}
.field{margin-bottom:18px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase}
.field input{width:100%;background:var(--input);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:.2s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,252,.15)}
.field input::placeholder{color:var(--muted)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),#5b3ef0);border:none;border-radius:12px;color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;margin-top:8px;letter-spacing:.3px}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(124,92,252,.4)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.error{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.3);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--danger);margin-bottom:16px;display:none}
.error.show{display:block}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.currency-select{width:100%;background:var(--input);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;cursor:pointer}
.currency-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,252,.15)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div class="container">
  <div class="logo">
    <div class="logo-mark">💸</div>
    <h1>Spend<span>Smart</span></h1>
    <p>Track every rupee. Master your money.</p>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="form active" id="loginForm">
      <div class="error" id="loginError"></div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="btn" onclick="doLogin()" id="loginBtn">Sign In</button>
    </div>

    <!-- REGISTER FORM -->
    <div class="form" id="registerForm">
      <div class="error" id="registerError"></div>
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Your name" />
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="regEmail" placeholder="you@example.com" />
      </div>
      <div class="field-row">
        <div class="field">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Min 6 chars" />
        </div>
        <div class="field">
          <label>Currency</label>
          <select class="currency-select" id="regCurrency">
            <option value="INR">₹ INR</option>
            <option value="USD">$ USD</option>
            <option value="EUR">€ EUR</option>
            <option value="GBP">£ GBP</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Monthly Budget (optional)</label>
        <input type="number" id="regBudget" placeholder="e.g. 30000" />
      </div>
      <button class="btn" onclick="doRegister()" id="registerBtn">Create Account</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:5000/api';

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===(t==='login'?0:1)));
  document.getElementById('loginForm').classList.toggle('active',t==='login');
  document.getElementById('registerForm').classList.toggle('active',t==='register');
}

function setLoading(btn,val){
  const el=document.getElementById(btn);
  el.disabled=val;
  el.innerHTML=val?'<span class="spinner"></span>Processing...':el.dataset.orig||(el.dataset.orig=el.innerHTML,el.innerHTML);
  if(!val)el.innerHTML=el.dataset.orig;
}

async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const password=document.getElementById('loginPassword').value;
  const err=document.getElementById('loginError');
  err.classList.remove('show');
  if(!email||!password){err.textContent='Please fill in all fields';err.classList.add('show');return;}
  setLoading('loginBtn',true);
  try{
    const r=await fetch(`${API}/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d=await r.json();
    if(!d.success)throw new Error(d.message||'Login failed');
    localStorage.setItem('token',d.token);
    localStorage.setItem('user',JSON.stringify(d.user));
    window.location.href='dashboard.html';
  }catch(e){err.textContent=e.message;err.classList.add('show');}
  setLoading('loginBtn',false);
}

async function doRegister(){
  const name=document.getElementById('regName').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const password=document.getElementById('regPassword').value;
  const currency=document.getElementById('regCurrency').value;
  const monthlyBudget=parseFloat(document.getElementById('regBudget').value)||0;
  const err=document.getElementById('registerError');
  err.classList.remove('show');
  if(!name||!email||!password){err.textContent='Please fill in all required fields';err.classList.add('show');return;}
  if(password.length<6){err.textContent='Password must be at least 6 characters';err.classList.add('show');return;}
  setLoading('registerBtn',true);
  try{
    const r=await fetch(`${API}/auth/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password,currency,monthlyBudget})});
    const d=await r.json();
    if(!d.success)throw new Error(d.message||'Registration failed');
    localStorage.setItem('token',d.token);
    localStorage.setItem('user',JSON.stringify(d.user));
    window.location.href='dashboard.html';
  }catch(e){err.textContent=e.message;err.classList.add('show');}
  setLoading('registerBtn',false);
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'){const lf=document.getElementById('loginForm');if(lf.classList.contains('active'))doLogin();else doRegister();}});
if(localStorage.getItem('token'))window.location.href='dashboard.html';
</script>
</body>
</html>
