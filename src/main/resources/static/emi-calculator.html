<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SpendSmart — EMI Calculator</title>

    <link rel="stylesheet" href="shared.css">

    <style>

        .calc-container{
            max-width:700px;
            margin:auto;
        }

        .result-card{
            margin-top:20px;
            display:none;
        }

        .result-grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:15px;
        }

        .result-item{
            background:var(--card2);
            border:1px solid var(--border);
            border-radius:12px;
            padding:18px;
        }

        .result-label{
            font-size:12px;
            color:var(--muted);
            margin-bottom:8px;
        }

        .result-value{
            font-family:'Syne',sans-serif;
            font-size:22px;
            font-weight:800;
            color:var(--accent);
        }

        .calculate-btn{
            width:100%;
            margin-top:20px;
            padding:14px;
            border:none;
            border-radius:12px;
            background:linear-gradient(
                135deg,
                var(--accent),
                #5b3ef0
            );
            color:white;
            cursor:pointer;
            font-weight:700;
        }

    </style>
</head>

<body>

<div id="sidebar-root"></div>

<div class="topbar">
    <div class="topbar-left">
        <div class="page-title">EMI Calculator</div>
        <div class="page-sub">
            Calculate loan EMI instantly
        </div>
    </div>
</div>

<main class="main">

    <div class="calc-container">

        <div class="card">

            <div class="field">
                <label>Loan Amount (₹)</label>
                <input type="number" id="principal">
            </div>

            <div class="field">
                <label>Annual Interest Rate (%)</label>
                <input type="number" id="rate">
            </div>

            <div class="field">
                <label>Tenure (Months)</label>
                <input type="number" id="months">
            </div>

            <button
                    class="calculate-btn"
                    onclick="calculateEMI()">
                Calculate EMI
            </button>

        </div>

        <div
                class="card result-card"
                id="resultCard">

            <div class="result-grid">

                <div class="result-item">
                    <div class="result-label">
                        Monthly EMI
                    </div>
                    <div class="result-value"
                         id="emiResult">
                        ₹0
                    </div>
                </div>

                <div class="result-item">
                    <div class="result-label">
                        Total Interest
                    </div>
                    <div class="result-value"
                         id="interestResult">
                        ₹0
                    </div>
                </div>

                <div class="result-item">
                    <div class="result-label">
                        Total Payment
                    </div>
                    <div class="result-value"
                         id="paymentResult">
                        ₹0
                    </div>
                </div>

            </div>

        </div>

    </div>

</main>

<script src="shared.js"></script>

<script>

    if(!requireAuth()) throw '';

    document.getElementById('sidebar-root')
    .innerHTML = renderSidebar('tools');

    async function calculateEMI(){

        const principal =
            document.getElementById('principal').value;

        const annualInterestRate =
            document.getElementById('rate').value;

        const tenureMonths =
            document.getElementById('months').value;

        const response = await apiFetch(
            '/tools/emi',
            {
                method:'POST',
                body:JSON.stringify({
                    principal,
                    annualInterestRate,
                    tenureMonths
                })
            }
        );

        if(!response){
            showToast(
                'Calculation failed',
                'error'
            );
            return;
        }

        document.getElementById(
            'resultCard'
        ).style.display='block';

        document.getElementById(
            'emiResult'
        ).textContent =
            '₹'+response.monthlyEmi;

        document.getElementById(
            'interestResult'
        ).textContent =
            '₹'+response.totalInterest;

        document.getElementById(
            'paymentResult'
        ).textContent =
            '₹'+response.totalPayment;
    }

</script>

</body>
</html>
