<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>SpendSmart — Dashboard</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        /* Dashboard-specific */
        .greeting{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.5px}
        .greeting-sub{color:var(--muted);font-size:12px;margin-top:3px}

        /* Stat card icon bg circles */
        .stat-card .stat-icon-wrap{
          width:38px;height:38px;border-radius:10px;
          display:flex;align-items:center;justify-content:center;
          font-size:17px;margin-bottom:12px;
        }
        .stat-card.purple .stat-icon-wrap{background:rgba(124,92,252,.15)}
        .stat-card.green  .stat-icon-wrap{background:rgba(34,211,165,.15)}
        .stat-card.orange .stat-icon-wrap{background:rgba(245,158,11,.15)}
        .stat-card.red    .stat-icon-wrap{background:rgba(244,63,94,.15)}

        /* Donut SVG */
        #donutSvg{overflow:visible}
        .donut-center-text{font-family:'Syne',sans-serif}

        /* Recent section inside card */
        .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
        .section-header a{font-size:12px;color:var(--accent);text-decoration:none;font-weight:500}
        .section-header a:hover{text-decoration:underline}

        /* Budget bar in stat card */
        .mini-progress{height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:8px}
        .mini-progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width 1s ease}
    </style>
</head>
<body>
<div id="sidebar-root"></div>

<!-- TOPBAR -->
<div class="topbar">
    <div class="topbar-left">
        <div class="page-title" id="greetTitle">Dashboard</div>
        <div class="page-sub" id="greetSub">Your financial overview</div>
    </div>
    <div class="topbar-right">
        <a href="/add-expense.html" class="btn-primary">+ Add Expense</a>
    </div>
</div>

<main class="main">
    <!-- GREETING -->
    <div style="margin-bottom:22px">
        <div class="greeting" id="greetFull">Good afternoon! 👋</div>
        <div class="greeting-sub" id="greetMonth"></div>
    </div>

    <!-- STAT CARDS -->
    <div class="stat-grid" id="statsGrid">
        <div class="stat-card purple">
            <div class="stat-icon-wrap">💳</div>
            <div class="stat-label">This Month</div>
            <div class="stat-value purple skeleton" style="height:28px;width:110px;border-radius:5px;margin:4px 0"></div>
        </div>
        <div class="stat-card orange">
            <div class="stat-icon-wrap">📅</div>
            <div class="stat-label">Last Month</div>
            <div class="stat-value orange skeleton" style="height:28px;width:110px;border-radius:5px;margin:4px 0"></div>
        </div>
        <div class="stat-card red">
            <div class="stat-icon-wrap">📊</div>
            <div class="stat-label">Total Spent</div>
            <div class="stat-value red skeleton" style="height:28px;width:110px;border-radius:5px;margin:4px 0"></div>
        </div>
        <div class="stat-card green">
            <div class="stat-icon-wrap">💰</div>
            <div class="stat-label">Budget Remaining</div>
            <div class="stat-value green skeleton" style="height:28px;width:110px;border-radius:5px;margin:4px 0"></div>
        </div>
    </div>

    <!-- CHARTS ROW -->
    <div class="chart-grid" style="margin-bottom:14px">
        <!-- BAR CHART -->
        <div class="card">
            <div class="section-header" style="margin-bottom:18px">
                <div class="card-title" style="margin:0">Last 7 Days</div>
            </div>
            <!-- Y labels + bars -->
            <div style="position:relative">
                <div id="yLabels" style="position:absolute;left:0;top:0;bottom:14px;display:flex;flex-direction:column;justify-content:space-between;width:36px;height:134px">
                    <span style="font-size:9px;color:var(--muted)"></span>
                    <span style="font-size:9px;color:var(--muted)"></span>
                    <span style="font-size:9px;color:var(--muted)">₹0</span>
                </div>
                <div style="margin-left:40px">
                    <div id="barChart" style="display:flex;gap:6px;align-items:flex-end;width:100%">
                        <div style="color:var(--muted);font-size:12px">Loading...</div>
                    </div>
                    <div style="border-top:1px solid var(--border);margin-top:0"></div>
                </div>
            </div>
        </div>

        <!-- PIE / DONUT CHART -->
        <div class="card">
            <div class="section-header" style="margin-bottom:18px">
                <div class="card-title" style="margin:0">By Category</div>
            </div>
            <div id="donutContainer" style="display:flex;gap:20px;align-items:center;justify-content:center">
                <div style="color:var(--muted);font-size:12px">Loading...</div>
            </div>
        </div>
    </div>

    <!-- RECENT + SUGGESTIONS -->
    <div class="grid-2">
        <!-- RECENT EXPENSES -->
        <div class="card">
            <div class="section-header">
                <div class="card-title" style="margin:0">Recent Expenses</div>
                <a href="/expenses.html">View all →</a>
            </div>
            <div id="recentList"><div style="color:var(--muted);font-size:12px">Loading...</div></div>
        </div>

        <!-- SUGGESTIONS -->
        <div class="card">
            <div class="section-header">
                <div class="card-title" style="margin:0">💡 Smart Insights</div>
            </div>
            <div id="suggestionsList"><div style="color:var(--muted);font-size:12px">Loading...</div></div>
        </div>
    </div>
</main>

<script src="shared.js"></script>
<script>
    if(!requireAuth())throw'';
    document.getElementById('sidebar-root').innerHTML = renderSidebar('dashboard');

    // Greeting
    const h = new Date().getHours();
    const user = getUser();
    const name = user?.name?.split(' ')[0] || 'there';
    const emoji = h < 12 ? '☀️' : h < 17 ? '👋' : '🌙';
    const greet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greetFull').textContent = `${greet}, ${name}! ${emoji}`;
    const now = new Date();
    document.getElementById('greetMonth').textContent =
      now.toLocaleDateString('en-IN',{month:'long',year:'numeric'}) + ' overview';

    // ─── DONUT CHART ─────────────────────────────────────────────
    function buildDonut(cats){
      const entries = Object.entries(cats)
        .map(([k,v])=>({key:k,...getCat(k),total:v.total||0}))
        .filter(e=>e.total>0)
        .sort((a,b)=>b.total-a.total)
        .slice(0,6);

      const grand = entries.reduce((s,e)=>s+e.total,0)||1;
      if(entries.length===0){
        document.getElementById('donutContainer').innerHTML='<div style="color:var(--muted);font-size:12px;text-align:center;padding:30px 0">No expenses this month</div>';
        return;
      }

      // SVG donut
      const R=60, r=40, cx=70, cy=70;
      let startAngle = -Math.PI/2;
      let slices='';
      function polar(cx,cy,radius,angle){ return [cx+radius*Math.cos(angle), cy+radius*Math.sin(angle)]; }

      entries.forEach(e=>{
        const slice = (e.total/grand)*2*Math.PI;
        const endAngle = startAngle+slice;
        const largeArc = slice>Math.PI?1:0;
        const [x1,y1]=polar(cx,cy,R,startAngle);
        const [x2,y2]=polar(cx,cy,R,endAngle);
        const [x3,y3]=polar(cx,cy,r,endAngle);
        const [x4,y4]=polar(cx,cy,r,startAngle);
        const pct = ((e.total/grand)*100).toFixed(1);
        slices+=`<path d="M${x1},${y1} A${R},${R},0,${largeArc},1,${x2},${y2} L${x3},${y3} A${r},${r},0,${largeArc},0,${x4},${y4} Z"
          fill="${e.color}" opacity="0.9" style="cursor:pointer;transition:.2s"
          onmouseover="this.style.opacity=1;this.style.filter='brightness(1.2)'"
          onmouseout="this.style.opacity=0.9;this.style.filter=''"
          title="${e.label}: ${fmtMoney(e.total)} (${pct}%)"/>`;
        startAngle=endAngle;
      });

      // Center text
      const topCat = entries[0];
      slices+=`
        <circle cx="${cx}" cy="${cy}" r="${r-4}" fill="var(--card)"/>
        <text x="${cx}" y="${cy-6}" text-anchor="middle" font-family="Syne,sans-serif" font-size="11" font-weight="700" fill="var(--text)">${topCat.icon}</text>
        <text x="${cx}" y="${cy+8}" text-anchor="middle" font-family="Syne,sans-serif" font-size="9" font-weight="600" fill="var(--muted)">${topCat.label.split(' ')[0]}</text>
        <text x="${cx}" y="${cy+20}" text-anchor="middle" font-family="Syne,sans-serif" font-size="10" font-weight="800" fill="${topCat.color}">${fmtMoney(topCat.total)}</text>`;

      const legend = entries.map(e=>`
        <div class="donut-legend-item">
          <div class="donut-dot" style="background:${e.color}"></div>
          <span class="donut-legend-name">${e.icon} ${e.label}</span>
          <span class="donut-legend-amt" style="color:${e.color}">${fmtMoney(e.total)}</span>
        </div>`).join('');

      document.getElementById('donutContainer').innerHTML=`
        <svg id="donutSvg" width="140" height="140" viewBox="0 0 140 140" class="donut-svg">${slices}</svg>
        <div class="donut-legend" style="flex:1;min-width:0">${legend}</div>`;
    }

    // ─── BAR CHART ────────────────────────────────────────────────
    function buildBars(days){
      const CHART_H = 120; // px — matches the container height we set below
      const max = Math.max(...days.map(d=>d.total), 1);

      // Y labels
      document.getElementById('yLabels').innerHTML=`
        <span style="font-size:9px;color:var(--muted)">${fmtMoney(max)}</span>
        <span style="font-size:9px;color:var(--muted)">${fmtMoney(Math.round(max/2))}</span>
        <span style="font-size:9px;color:var(--muted)">₹0</span>`;

      document.getElementById('barChart').innerHTML=days.map(d=>{
        const barH = Math.max(Math.round((d.total / max) * CHART_H), 4);
        const label = new Date(d.date).toLocaleDateString('en',{weekday:'short'});
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:5px;height:${CHART_H}px">
          <div title="${fmtMoney(d.total)}"
            style="width:80%;height:${barH}px;border-radius:5px 5px 0 0;
                   background:linear-gradient(180deg,var(--accent),rgba(124,92,252,.4));
                   cursor:pointer;transition:background .2s;"
            onmouseover="this.style.background='linear-gradient(180deg,var(--accent2),rgba(34,211,165,.4))'"
            onmouseout="this.style.background='linear-gradient(180deg,var(--accent),rgba(124,92,252,.4))'">
          </div>
          <div style="font-size:9px;color:var(--muted);white-space:nowrap">${label}</div>
        </div>`;
      }).join('');
    }

    // ─── LOAD DATA ────────────────────────────────────────────────
    async function loadDashboard(){
      const d = await apiFetch('/dashboard/stats');
      if(!d?.success) return;
      const s = d.stats;

      // Stat cards
      const changeClass = s.percentChange>=0 ? 'up' : 'down';
      const changeArrow = s.percentChange>=0 ? '↑' : '↓';
      document.getElementById('statsGrid').innerHTML=`
        <div class="stat-card purple">
          <div class="stat-icon-wrap">💳</div>
          <div class="stat-label">This Month</div>
          <div class="stat-value purple">${fmtMoney(s.thisMonthTotal)}</div>
          <div class="stat-change">${s.thisMonthCount} transactions</div>
        </div>
        <div class="stat-card orange">
          <div class="stat-icon-wrap">📅</div>
          <div class="stat-label">Last Month</div>
          <div class="stat-value orange">${fmtMoney(s.lastMonthTotal)}</div>
          <div class="stat-change ${changeClass}">${changeArrow} ${Math.abs(s.percentChange||0).toFixed(0)}% vs now</div>
        </div>
        <div class="stat-card red">
          <div class="stat-icon-wrap">📊</div>
          <div class="stat-label">Total Spent</div>
          <div class="stat-value red">${fmtMoney(s.totalAllTime)}</div>
          <div class="stat-change">All time</div>
        </div>
        <div class="stat-card green">
          <div class="stat-icon-wrap">💰</div>
          <div class="stat-label">Budget Remaining</div>
          <div class="stat-value green">${fmtMoney(s.budgetRemaining)}</div>
          <div class="mini-progress"><div class="mini-progress-fill" style="width:${Math.min(s.budgetUsed||0,100)}%"></div></div>
          <div class="stat-change">${(s.budgetUsed||0).toFixed(0)}% used of ${fmtMoney(s.monthlyBudget||0)}</div>
        </div>`;

      // Charts
      buildBars(s.last7Days||[]);
      buildDonut(s.categoryBreakdown||{});

      // Recent
      const recent = s.recentExpenses||[];
      document.getElementById('recentList').innerHTML = recent.length
        ? recent.map(e=>{
            const c=getCat(e.category);
            return `<div class="recent-row" onclick="window.location='/expenses.html'">
              <div class="recent-icon" style="background:${c.color}18">${c.icon}</div>
              <div style="flex:1">
                <div class="recent-title">${e.title}</div>
                <div class="recent-date">${relDate(e.date)}</div>
              </div>
              <div class="recent-amt">-${fmtMoney(e.amount)}</div>
            </div>`;
          }).join('')
        : `<div class="empty"><div class="empty-icon">🧾</div><h3>No expenses yet</h3><p>Add your first expense!</p></div>`;
    }

    async function loadSuggestions(){
      const d = await apiFetch('/dashboard/suggestions');
      if(!d?.success) return;
      document.getElementById('suggestionsList').innerHTML=(d.suggestions||[]).map(s=>`
        <div class="type-${s.type}">
          <div class="suggestion-item">
            <div class="suggestion-icon">${s.icon}</div>
            <div><div class="suggestion-title">${s.title}</div><div class="suggestion-msg">${s.message}</div></div>
          </div>
        </div>`).join('')||'<div class="empty"><div class="empty-icon">💡</div><h3>No insights yet</h3></div>';
    }

    loadDashboard();
    loadSuggestions();
</script>
</body>
</html>
