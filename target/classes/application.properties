# Server
server.port=5000

# MySQL Database
# Change 3307 to 3306 if you are using the default MySQL port
spring.datasource.url=jdbc:mysql://localhost:3307/expense_tracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=spendsmart_super_secret_jwt_key_2024_change_this_to_a_longer_base64_key
app.jwt.expiration-ms=2592000000

# CORS
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.expensetracker=DEBUG
logging.level.org.springframework.security=DEBUG
