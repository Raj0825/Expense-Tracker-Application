<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SpendSmart — Dashboard</title>
<link rel="stylesheet" href="shared.css">
<style>
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:120px;padding-top:12px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.bar{width:100%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--accent),#5b3ef0);min-height:4px;transition:height .5s cubic-bezier(.34,1.56,.64,1)}
.bar-wrap:hover .bar{opacity:.85}
.bar-label{font-size:9px;color:var(--muted);text-align:center}
.progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .8s ease}
.cat-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(30,30,58,.5)}
.cat-row:last-child{border:none}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-name{flex:1;font-size:13px}
.cat-pct{font-size:12px;color:var(--muted)}
.cat-amt{font-size:13px;font-weight:600;text-align:right}
.recent-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(30,30,58,.4);cursor:pointer;transition:.15s}
.recent-row:last-child{border:none}
.recent-row:hover{background:rgba(255,255,255,.02);border-radius:10px;padding-left:8px;padding-right:8px}
.recent-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.recent-title{font-size:13px;font-weight:500}
.recent-date{font-size:11px;color:var(--muted);margin-top:2px}
.recent-amt{font-size:14px;font-weight:700;text-align:right;color:var(--danger)}
.suggestion-card{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.suggestion-icon{font-size:20px;flex-shrink:0}
.suggestion-title{font-size:13px;font-weight:600;margin-bottom:4px}
.suggestion-msg{font-size:12px;color:var(--muted);line-height:1.5}
.type-warning .suggestion-card{border-color:rgba(245,158,11,.25)}
.type-alert .suggestion-card{border-color:rgba(244,63,94,.25)}
.type-success .suggestion-card{border-color:rgba(34,211,165,.25)}
</style>
</head>
<body>
<div id="sidebar-root"></div>
<main class="main">
  <div class="page-header" style="display:flex;align-items:center;justify-content:space-between">
    <div>
      <div class="page-title" id="greetTitle">Good morning! 👋</div>
      <div class="page-sub">Here's your financial snapshot</div>
    </div>
    <a href="add-expense.html" class="btn-primary" style="text-decoration:none;display:inline-block">+ Add Expense</a>
  </div>

  <!-- STAT CARDS -->
  <div class="stat-grid" id="statsGrid">
    <div class="stat-card purple"><div class="stat-label">This Month</div><div class="stat-value purple skeleton" style="height:32px;width:120px;border-radius:6px"></div></div>
    <div class="stat-card green"><div class="stat-label">Budget Left</div><div class="stat-value green skeleton" style="height:32px;width:120px;border-radius:6px"></div></div>
    <div class="stat-card orange"><div class="stat-label">Last Month</div><div class="stat-value orange skeleton" style="height:32px;width:120px;border-radius:6px"></div></div>
    <div class="stat-card red"><div class="stat-label">All Time</div><div class="stat-value red skeleton" style="height:32px;width:120px;border-radius:6px"></div></div>
  </div>

  <!-- BUDGET PROGRESS -->
  <div class="card" style="margin-bottom:20px;display:none" id="budgetCard">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div style="font-size:13px;font-weight:600">Monthly Budget Usage</div>
      <div style="font-size:13px;color:var(--muted)" id="budgetPctText"></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="budgetBar" style="width:0%"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--muted)">
      <span id="budgetSpent"></span><span id="budgetTotal"></span>
    </div>
  </div>

  <div class="grid-2">
    <!-- 7-DAY CHART -->
    <div class="card">
      <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:16px">7-Day Spending</div>
      <div class="bar-chart" id="barChart"><div style="color:var(--muted);font-size:12px">Loading...</div></div>
    </div>
    <!-- CATEGORY BREAKDOWN -->
    <div class="card">
      <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:16px">This Month by Category</div>
      <div id="catBreakdown"><div style="color:var(--muted);font-size:12px">Loading...</div></div>
    </div>
  </div>

  <div class="grid-2" style="margin-top:20px">
    <!-- RECENT EXPENSES -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700">Recent Expenses</div>
        <a href="expenses.html" style="font-size:12px;color:var(--accent);text-decoration:none">View all →</a>
      </div>
      <div id="recentList"><div style="color:var(--muted);font-size:12px">Loading...</div></div>
    </div>
    <!-- SUGGESTIONS -->
    <div class="card">
      <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:16px">💡 Smart Insights</div>
      <div id="suggestionsList" style="display:flex;flex-direction:column;gap:10px"><div style="color:var(--muted);font-size:12px">Loading...</div></div>
    </div>
  </div>
</main>

<script src="shared.js"></script>
<script>
if(!requireAuth())throw'';
document.getElementById('sidebar-root').innerHTML=renderSidebar('dashboard');
const h=new Date().getHours();
document.getElementById('greetTitle').textContent=`${h<12?'Good morning':h<17?'Good afternoon':'Good evening'}, ${getUser()?.name?.split(' ')[0]||'there'}! ${h<12?'☀️':h<17?'🌤️':'🌙'}`;

async function loadDashboard(){
  const d=await apiFetch('/dashboard/stats');
  if(!d?.success)return;
  const s=d.stats;

  // Stats
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card purple"><div class="stat-label">This Month</div><div class="stat-value purple">${fmtMoney(s.thisMonthTotal)}</div><div class="stat-change">${s.thisMonthCount} transactions</div></div>
    <div class="stat-card green"><div class="stat-label">Budget Left</div><div class="stat-value green">${fmtMoney(s.budgetRemaining)}</div><div class="stat-change">${s.budgetUsed?.toFixed(0)||0}% used</div></div>
    <div class="stat-card orange"><div class="stat-label">Last Month</div><div class="stat-value orange">${fmtMoney(s.lastMonthTotal)}</div><div class="stat-change">${s.percentChange>0?'↑':'↓'} ${Math.abs(s.percentChange)}% vs now</div></div>
    <div class="stat-card red"><div class="stat-label">All Time</div><div class="stat-value red">${fmtMoney(s.totalAllTime)}</div><div class="stat-change">total spent</div></div>`;

  // Budget bar
  if(s.monthlyBudget>0){
    document.getElementById('budgetCard').style.display='block';
    document.getElementById('budgetBar').style.width=Math.min(s.budgetUsed,100)+'%';
    document.getElementById('budgetPctText').textContent=`${s.budgetUsed?.toFixed(0)}%`;
    document.getElementById('budgetSpent').textContent=`Spent: ${fmtMoney(s.thisMonthTotal)}`;
    document.getElementById('budgetTotal').textContent=`Budget: ${fmtMoney(s.monthlyBudget)}`;
    if(s.budgetUsed>=90)document.getElementById('budgetBar').style.background='linear-gradient(90deg,var(--danger),#ff6b6b)';
  }

  // 7-day bar chart
  const days=s.last7Days||[];
  const max=Math.max(...days.map(d=>d.total),1);
  document.getElementById('barChart').innerHTML=days.map(d=>`
    <div class="bar-wrap">
      <div class="bar" style="height:${Math.max((d.total/max)*100,4)}%" title="${fmtMoney(d.total)}"></div>
      <div class="bar-label">${new Date(d.date).toLocaleDateString('en',{weekday:'short'})}</div>
    </div>`).join('');

  // Category breakdown
  const cats=s.categoryBreakdown||{};
  const total=Object.values(cats).reduce((a,c)=>a+(c.total||0),0)||1;
  const catHTML=Object.entries(cats).sort((a,b)=>b[1].total-a[1].total).slice(0,6).map(([k,v])=>{
    const c=getCat(k); const pct=((v.total/total)*100).toFixed(0);
    return `<div class="cat-row"><div class="cat-dot" style="background:${c.color}"></div><span class="cat-name">${c.icon} ${c.label}</span><span class="cat-pct">${pct}%</span><span class="cat-amt">${fmtMoney(v.total)}</span></div>`;
  }).join('');
  document.getElementById('catBreakdown').innerHTML=catHTML||'<div style="color:var(--muted);font-size:12px;padding:20px 0;text-align:center">No expenses this month</div>';

  // Recent
  const recent=s.recentExpenses||[];
  document.getElementById('recentList').innerHTML=recent.length?recent.map(e=>{
    const c=getCat(e.category);
    return `<div class="recent-row" onclick="window.location='expenses.html'">
      <div class="recent-icon" style="background:${c.color}18">${c.icon}</div>
      <div style="flex:1"><div class="recent-title">${e.title}</div><div class="recent-date">${relDate(e.date)}</div></div>
      <div class="recent-amt">-${fmtMoney(e.amount)}</div>
    </div>`;
  }).join(''):`<div class="empty"><div class="empty-icon">🧾</div><h3>No expenses yet</h3><p>Add your first expense!</p></div>`;
}

async function loadSuggestions(){
  const d=await apiFetch('/dashboard/suggestions');
  if(!d?.success)return;
  document.getElementById('suggestionsList').innerHTML=(d.suggestions||[]).map(s=>`
    <div class="type-${s.type}">
      <div class="suggestion-card">
        <div class="suggestion-icon">${s.icon}</div>
        <div><div class="suggestion-title">${s.title}</div><div class="suggestion-msg">${s.message}</div></div>
      </div>
    </div>`).join('');
}

loadDashboard();
loadSuggestions();
</script>
</body>
</html>
