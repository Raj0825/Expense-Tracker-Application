<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SpendSmart — Expenses</title>
<link rel="stylesheet" href="shared.css">
<style>
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:flex-end}
.filters .field{margin:0;min-width:130px}
.filters input,.filters select{padding:10px 12px;font-size:12px}
.exp-card{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;border:1px solid var(--border);background:var(--card2);margin-bottom:10px;transition:.15s;cursor:pointer}
.exp-card:hover{border-color:rgba(124,92,252,.3);transform:translateX(2px)}
.exp-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.exp-title{font-size:14px;font-weight:600;margin-bottom:3px}
.exp-meta{font-size:11px;color:var(--muted)}
.exp-amount{font-size:16px;font-weight:800;font-family:'Syne',sans-serif;color:var(--danger);white-space:nowrap}
.exp-actions{display:flex;gap:6px;flex-shrink:0}
.pagination{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:24px}
.page-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;transition:.15s;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif}
.page-btn:hover{border-color:var(--accent);color:var(--accent)}
.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.page-btn:disabled{opacity:.3;cursor:not-allowed}
.payment-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:10px;background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}
.total-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;font-size:13px}
</style>
</head>
<body>
<div id="sidebar-root"></div>
<main class="main">
  <div class="page-header" style="display:flex;align-items:center;justify-content:space-between">
    <div><div class="page-title">Expenses</div><div class="page-sub">All your transactions in one place</div></div>
    <a href="add-expense.html" class="btn-primary" style="text-decoration:none">+ Add Expense</a>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <div class="field"><label>Search</label><input type="text" id="fSearch" placeholder="Search title..." oninput="debounceLoad()"></div>
    <div class="field"><label>Category</label>
      <select id="fCat" onchange="loadExpenses(1)">
        <option value="all">All Categories</option>
        <option value="food">🍔 Food</option><option value="travel">✈️ Travel</option>
        <option value="clothes">👗 Clothes</option><option value="bills">⚡ Bills</option>
        <option value="entertainment">🎬 Entertainment</option><option value="health">💊 Health</option>
        <option value="education">📚 Education</option><option value="shopping">🛍️ Shopping</option>
        <option value="housing">🏠 Housing</option><option value="personal">💆 Personal</option>
        <option value="other">📦 Other</option>
      </select>
    </div>
    <div class="field"><label>From</label><input type="date" id="fFrom" onchange="loadExpenses(1)"></div>
    <div class="field"><label>To</label><input type="date" id="fTo" onchange="loadExpenses(1)"></div>
    <button class="btn-ghost" onclick="clearFilters()">Clear</button>
  </div>

  <div class="total-bar" id="totalBar" style="display:none"></div>
  <div id="expList"><div style="color:var(--muted);font-size:13px">Loading...</div></div>
  <div class="pagination" id="pagination"></div>
</main>

<!-- DELETE CONFIRM -->
<div class="modal-overlay" id="delModal">
  <div class="modal" style="max-width:360px">
    <div class="modal-header"><div class="modal-title">Delete Expense?</div><button class="modal-close" onclick="closeDelModal()">✕</button></div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:20px">This action cannot be undone.</p>
    <div style="display:flex;gap:10px">
      <button class="btn-ghost" style="flex:1" onclick="closeDelModal()">Cancel</button>
      <button class="btn-danger" style="flex:1;padding:10px" id="confirmDelBtn" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
if(!requireAuth())throw'';
document.getElementById('sidebar-root').innerHTML=renderSidebar('expenses');
let currentPage=1, totalPages=1, deleteId=null, debTimer;

function debounceLoad(){ clearTimeout(debTimer); debTimer=setTimeout(()=>loadExpenses(1),400); }
function clearFilters(){
  document.getElementById('fSearch').value='';
  document.getElementById('fCat').value='all';
  document.getElementById('fFrom').value='';
  document.getElementById('fTo').value='';
  loadExpenses(1);
}

async function loadExpenses(page=1){
  currentPage=page;
  const search=document.getElementById('fSearch').value.trim();
  const cat=document.getElementById('fCat').value;
  const from=document.getElementById('fFrom').value;
  const to=document.getElementById('fTo').value;
  let qs=`?page=${page}&limit=15`;
  if(search)qs+=`&search=${encodeURIComponent(search)}`;
  if(cat&&cat!=='all')qs+=`&category=${cat}`;
  if(from)qs+=`&startDate=${from}`;
  if(to)qs+=`&endDate=${to}`;
  const list=document.getElementById('expList');
  list.innerHTML='<div style="color:var(--muted);font-size:13px">Loading...</div>';
  const d=await apiFetch(`/expenses${qs}`);
  if(!d?.success){list.innerHTML='<div style="color:var(--muted)">Failed to load</div>';return;}
  totalPages=d.totalPages||1;
  const tb=document.getElementById('totalBar');
  tb.style.display='flex';
  tb.innerHTML=`<span style="color:var(--muted)">Showing <b style="color:var(--text)">${d.count}</b> of <b style="color:var(--text)">${d.total}</b> expenses</span><span style="font-weight:700;color:var(--accent)">Page ${d.currentPage}/${d.totalPages}</span>`;
  if(!d.expenses?.length){list.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><h3>No expenses found</h3><p>Try adjusting your filters</p></div>`;renderPagination();return;}
  list.innerHTML=d.expenses.map(e=>{
    const c=getCat(e.category);
    const pay={cash:'💵',card:'💳',upi:'📱',netbanking:'🏦',other:'💰'};
    return `<div class="exp-card">
      <div class="exp-icon" style="background:${c.color}18">${c.icon}</div>
      <div style="flex:1;min-width:0">
        <div class="exp-title">${e.title}</div>
        <div class="exp-meta">${fmtDate(e.date)} · <span class="payment-tag">${pay[e.paymentMethod]||'💰'} ${e.paymentMethod}</span> ${catBadge(e.category)}</div>
        ${e.description?`<div style="font-size:11px;color:var(--muted);margin-top:3px">${e.description}</div>`:''}
      </div>
      <div style="text-align:right">
        <div class="exp-amount">-${fmtMoney(e.amount)}</div>
        <div class="exp-actions" style="margin-top:6px">
          <a href="add-expense.html?id=${e.id}" class="btn-ghost" style="font-size:11px;padding:5px 10px;text-decoration:none">Edit</a>
          <button class="btn-danger" style="font-size:11px;padding:5px 10px" onclick="openDel(${e.id},event)">Del</button>
        </div>
      </div>
    </div>`;
  }).join('');
  renderPagination();
}

function renderPagination(){
  const p=document.getElementById('pagination');
  if(totalPages<=1){p.innerHTML='';return;}
  let h=`<button class="page-btn" onclick="loadExpenses(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for(let i=Math.max(1,currentPage-2);i<=Math.min(totalPages,currentPage+2);i++)
    h+=`<button class="page-btn${i===currentPage?' active':''}" onclick="loadExpenses(${i})">${i}</button>`;
  h+=`<button class="page-btn" onclick="loadExpenses(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  p.innerHTML=h;
}

function openDel(id,e){e.stopPropagation();deleteId=id;document.getElementById('delModal').classList.add('open');}
function closeDelModal(){document.getElementById('delModal').classList.remove('open');deleteId=null;}
async function confirmDelete(){
  if(!deleteId)return;
  const d=await apiFetch(`/expenses/${deleteId}`,{method:'DELETE'});
  closeDelModal();
  if(d?.success){showToast('Expense deleted');loadExpenses(currentPage);}
  else showToast('Failed to delete','error');
}

loadExpenses(1);
</script>
</body>
</html>
