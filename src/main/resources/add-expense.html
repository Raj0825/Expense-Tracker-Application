<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SpendSmart — Add Expense</title>
<link rel="stylesheet" href="shared.css">
<style>
.form-card{max-width:600px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:4px}
.cat-btn{background:var(--input);border:1px solid var(--border);border-radius:10px;padding:10px 8px;cursor:pointer;text-align:center;transition:.15s;color:var(--text)}
.cat-btn:hover{border-color:rgba(124,92,252,.4)}
.cat-btn.selected{background:rgba(124,92,252,.15);border-color:var(--accent);color:var(--accent)}
.cat-btn .ci{font-size:20px;display:block;margin-bottom:4px}
.cat-btn .cl{font-size:10px;font-weight:600}
.pay-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:4px}
.pay-btn{background:var(--input);border:1px solid var(--border);border-radius:10px;padding:10px 6px;cursor:pointer;text-align:center;transition:.15s;color:var(--text)}
.pay-btn:hover{border-color:rgba(124,92,252,.4)}
.pay-btn.selected{background:rgba(34,211,165,.12);border-color:var(--accent2);color:var(--accent2)}
.pay-btn .pi{font-size:18px;display:block;margin-bottom:3px}
.pay-btn .pl{font-size:10px;font-weight:600}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.tag-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:rgba(124,92,252,.12);border:1px solid rgba(124,92,252,.2);border-radius:20px;font-size:11px;color:var(--accent)}
.tag button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;padding:0}
.amount-display{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;color:var(--accent);text-align:center;padding:24px 0;letter-spacing:-2px}
.save-row{display:flex;gap:10px;margin-top:8px}
.save-btn{flex:1;padding:15px;background:linear-gradient(135deg,var(--accent),#5b3ef0);border:none;border-radius:12px;color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:.2s}
.save-btn:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(124,92,252,.4)}
.save-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
</style>
</head>
<body>
<div id="sidebar-root"></div>
<main class="main">
  <div class="page-header">
    <div class="page-title" id="pageTitle">Add Expense</div>
    <div class="page-sub" id="pageSub">Record a new transaction</div>
  </div>

  <div class="card form-card">
    <!-- AMOUNT -->
    <div class="field">
      <label>Amount</label>
      <input type="number" id="amount" min="0.01" step="0.01" placeholder="0.00" style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent);text-align:center;padding:16px" oninput="updateAmt()">
      <div class="amount-display" id="amtDisplay" style="display:none"></div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Title</label>
        <input type="text" id="title" placeholder="What did you spend on?" maxlength="100">
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="date">
      </div>
    </div>

    <div class="field">
      <label>Category</label>
      <div class="cat-grid" id="catGrid"></div>
      <input type="hidden" id="category">
    </div>

    <div class="field">
      <label>Payment Method</label>
      <div class="pay-grid" id="payGrid"></div>
      <input type="hidden" id="paymentMethod" value="cash">
    </div>

    <div class="field">
      <label>Description (optional)</label>
      <textarea id="description" rows="2" placeholder="Any notes..." maxlength="500" style="resize:vertical"></textarea>
    </div>

    <div class="field-row">
      <div class="field">
        <label><input type="checkbox" id="isRecurring" style="width:auto;margin-right:6px" onchange="toggleRecurring()"> Recurring</label>
        <div id="recurringOpt" style="display:none;margin-top:8px">
          <select id="recurringFrequency">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly" selected>Monthly</option>
            <option value="yearly">Yearly</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Tags (press Enter)</label>
        <input type="text" id="tagInput" placeholder="Add tag..." onkeydown="addTag(event)">
        <div class="tag-wrap" id="tagList"></div>
      </div>
    </div>

    <div class="save-row">
      <a href="expenses.html" class="btn-ghost" style="padding:15px;text-decoration:none;text-align:center;border-radius:12px;font-size:14px;display:flex;align-items:center;justify-content:center">Cancel</a>
      <button class="save-btn" id="saveBtn" onclick="saveExpense()">Save Expense</button>
    </div>
  </div>
</main>

<script src="shared.js"></script>
<script>
if(!requireAuth())throw'';
document.getElementById('sidebar-root').innerHTML=renderSidebar('add');
const urlId=new URLSearchParams(location.search).get('id');
let tags=[];

// Set default date
document.getElementById('date').value=new Date().toISOString().split('T')[0];

// Build category buttons
const CATS_LIST=[
  {v:'food',i:'🍔',l:'Food'},{v:'travel',i:'✈️',l:'Travel'},{v:'clothes',i:'👗',l:'Clothes'},
  {v:'bills',i:'⚡',l:'Bills'},{v:'entertainment',i:'🎬',l:'Entertain'},{v:'health',i:'💊',l:'Health'},
  {v:'education',i:'📚',l:'Education'},{v:'shopping',i:'🛍️',l:'Shopping'},{v:'housing',i:'🏠',l:'Housing'},
  {v:'personal',i:'💆',l:'Personal'},{v:'other',i:'📦',l:'Other'}
];
document.getElementById('catGrid').innerHTML=CATS_LIST.map(c=>
  `<button type="button" class="cat-btn" onclick="selCat('${c.v}',this)"><span class="ci">${c.i}</span><span class="cl">${c.l}</span></button>`
).join('');

const PAYS=[{v:'cash',i:'💵',l:'Cash'},{v:'card',i:'💳',l:'Card'},{v:'upi',i:'📱',l:'UPI'},{v:'netbanking',i:'🏦',l:'NetBank'},{v:'other',i:'💰',l:'Other'}];
document.getElementById('payGrid').innerHTML=PAYS.map(p=>
  `<button type="button" class="pay-btn${p.v==='cash'?' selected':''}" onclick="selPay('${p.v}',this)"><span class="pi">${p.i}</span><span class="pl">${p.l}</span></button>`
).join('');

function selCat(v,el){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('category').value=v;
}
function selPay(v,el){
  document.querySelectorAll('.pay-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('paymentMethod').value=v;
}
function updateAmt(){
  const v=parseFloat(document.getElementById('amount').value);
  if(v>999){document.getElementById('amtDisplay').style.display='block';document.getElementById('amtDisplay').textContent=fmtMoney(v);}
  else document.getElementById('amtDisplay').style.display='none';
}
function toggleRecurring(){
  document.getElementById('recurringOpt').style.display=document.getElementById('isRecurring').checked?'block':'none';
}
function addTag(e){
  if(e.key!=='Enter')return;e.preventDefault();
  const v=document.getElementById('tagInput').value.trim();
  if(v&&!tags.includes(v)){tags.push(v);renderTags();}
  document.getElementById('tagInput').value='';
}
function removeTag(i){tags.splice(i,1);renderTags();}
function renderTags(){
  document.getElementById('tagList').innerHTML=tags.map((t,i)=>`<span class="tag">${t}<button onclick="removeTag(${i})">✕</button></span>`).join('');
}

// Load existing expense
if(urlId){
  document.getElementById('pageTitle').textContent='Edit Expense';
  document.getElementById('pageSub').textContent='Update this transaction';
  document.getElementById('saveBtn')._orig='Update Expense';
  document.getElementById('saveBtn').textContent='Update Expense';
  (async()=>{
    const d=await apiFetch(`/expenses/${urlId}`);
    if(!d)return;
    const e=d.expense||d;
    document.getElementById('amount').value=e.amount;
    document.getElementById('title').value=e.title;
    document.getElementById('date').value=e.date?.split('T')[0]||'';
    document.getElementById('description').value=e.description||'';
    document.getElementById('category').value=e.category;
    document.getElementById('paymentMethod').value=e.paymentMethod||'cash';
    document.getElementById('isRecurring').checked=e.isRecurring||false;
    if(e.isRecurring&&e.recurringFrequency){document.getElementById('recurringOpt').style.display='block';document.getElementById('recurringFrequency').value=e.recurringFrequency;}
    tags=e.tags||[];renderTags();updateAmt();
    document.querySelectorAll('.cat-btn').forEach(b=>{if(b.getAttribute('onclick').includes(`'${e.category}'`))b.classList.add('selected');});
    document.querySelectorAll('.pay-btn').forEach(b=>{b.classList.remove('selected');if(b.getAttribute('onclick').includes(`'${e.paymentMethod||'cash'}'`))b.classList.add('selected');});
  })();
}

async function saveExpense(){
  const amount=parseFloat(document.getElementById('amount').value);
  const title=document.getElementById('title').value.trim();
  const date=document.getElementById('date').value;
  const category=document.getElementById('category').value;
  const paymentMethod=document.getElementById('paymentMethod').value;
  const description=document.getElementById('description').value.trim();
  const isRecurring=document.getElementById('isRecurring').checked;
  const recurringFrequency=isRecurring?document.getElementById('recurringFrequency').value:null;

  if(!amount||amount<=0){showToast('Enter a valid amount','error');return;}
  if(!title){showToast('Enter a title','error');return;}
  if(!date){showToast('Select a date','error');return;}
  if(!category){showToast('Select a category','error');return;}

  const body={amount,title,date:new Date(date).toISOString(),category,paymentMethod,description,isRecurring,recurringFrequency,tags};
  spin('saveBtn',true);
  const method=urlId?'PUT':'POST';
  const url=urlId?`/expenses/${urlId}`:'/expenses';
  const d=await apiFetch(url,{method,body:JSON.stringify(body)});
  spin('saveBtn',false);
  if(d?.success||d?.id){showToast(urlId?'Expense updated!':'Expense saved!');setTimeout(()=>window.location.href='expenses.html',800);}
  else showToast(d?.message||'Failed to save','error');
}
</script>
</body>
</html>
